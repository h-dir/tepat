<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aplikasi Absensi</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:12px}
    .section{border:1px solid #ddd;padding:12px;margin-bottom:12px;border-radius:6px}
    button{padding:8px 12px;margin:6px 0}
    input,select{padding:6px;margin:6px 0;width:100%}
    #video{width:100%;max-width:360px}
    .small{font-size:12px;color:#666}
  </style>
</head>
<body>
  <h2>Aplikasi Absensi (Versi Gratis)</h2>

  <div class="section" id="loginSection">
    <h3>Admin Login</h3>
    <input id="adminUser" placeholder="Username" value="admin">
    <input id="adminPass" placeholder="Password" type="password">
    <button onclick="adminLogin()">Login sebagai Admin</button>
    <div id="adminMsg" class="small"></div>
  </div>

  <div class="section" id="adminPanel" style="display:none">
    <h3>Dashboard Admin</h3>
    <button onclick="showCreateEmployee()">Buat Karyawan Baru</button>
    <button onclick="loadEmployees()">Muat Daftar Karyawan</button>
    <button onclick="downloadReport('today')">Laporan Hari Ini (Download)</button>
    <div id="adminArea"></div>
  </div>

  <div class="section">
    <h3>Absensi Karyawan</h3>
    <div id="qrArea">
      <p class="small">Scan QR atau masukkan EmployeeID</p>
      <input id="employeeIdInput" placeholder="EmployeeID (atau scan QR)">
      <button onclick="startQR()">Scan QR</button>
