<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aplikasi Absensi</title>
  <style>
    :root{--accent:#0b6efd;--muted:#6b7280;--card:#ffffff;--bg:#f4f6fb}
    body{font-family:Inter,Arial,Helvetica,sans-serif;background:var(--bg);margin:0;padding:20px;color:#111}
    .container{max-width:980px;margin:0 auto}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    h1{font-size:20px;margin:0}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);padding:16px;border-radius:10px;box-shadow:0 1px 4px rgba(16,24,40,0.06)}
    label{display:block;font-size:13px;color:var(--muted);margin-top:8px}
    input,select,button{width:100%;padding:10px;border-radius:8px;border:1px solid #e6e9ef;font-size:14px}
    button{background:var(--accent);color:#fff;border:none;cursor:pointer}
    button.secondary{background:#fff;color:var(--accent);border:1px solid #dbe4ff}
    .small{font-size:12px;color:var(--muted)}
    #video{width:100%;border-radius:8px;background:#000}
    .preview img{max-width:160px;border-radius:8px;margin-top:8px}
    .fullwidth{grid-column:1 / -1}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    th,td{padding:8px;border-bottom:1px solid #f0f2f5;text-align:left;font-size:13px}
    .actions{display:flex;gap:8px}
    @media(max-width:800px){.grid{grid-template-columns:1fr}.fullwidth{grid-column:auto}}
    .hint{font-size:12px;color:#444;margin-top:6px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Aplikasi Absensi — Versi Gratis</h1>
      <div class="small">Selfie → Drive; Data → Google Sheets</div>
    </header>

    <div class="grid">
      <!-- Admin Panel -->
      <div class="card">
        <h3>Admin Login</h3>
        <label>Username</label>
        <input id="adminUser" value="admin" />
        <label>Password</label>
        <input id="adminPass" type="password" />
        <div style="margin-top:10px;display:flex;gap:8px">
          <button onclick="adminLogin()">Login</button>
          <button class="secondary" onclick="logoutAdmin()">Logout</button>
        </div>
        <div id="adminMsg" class="small" style="margin-top:8px"></div>

        <div id="adminArea" style="margin-top:12px;display:none">
          <hr>
          <h4>Manajemen Karyawan</h4>
          <label>EmployeeID</label><input id="ce_id" placeholder="EMP001">
          <label>Nama</label><input id="ce_name" placeholder="Nama Karyawan">
          <label>Departemen</label><input id="ce_dept" placeholder="Departemen">
          <label>Email</label><input id="ce_email" placeholder="email@domain.com">
          <label>Phone</label><input id="ce_phone" placeholder="0812xxxx">
          <label>Password (opsional)</label><input id="ce_pass" placeholder="Password awal (opsional)">
          <div style="margin-top:8px;display:flex;gap:8px">
            <button onclick="createEmployee()">Buat Karyawan</button>
            <button onclick="loadEmployees()">Muat Daftar</button>
          </div>
          <div id="ce_msg" class="small" style="margin-top:8px"></div>
          <div id="employeesList" style="margin-top:12px"></div>
        </div>
      </div>

      <!-- Attendance Panel -->
      <div class="card">
        <h3>Absensi Karyawan</h3>
        <label>EmployeeID (atau scan QR)</label>
        <div style="display:flex;gap:8px">
          <input id="employeeIdInput" placeholder="EMP001">
          <button onclick="openScanner()">Scan QR</button>
        </div>

        <label>Status</label>
        <select id="statusSelect">
          <option value="Masuk">Absen Masuk</option>
          <option value="Keluar">Absen Keluar</option>
          <option value="Izin">Izin</option>
          <option value="Cuti">Cuti</option>
          <option value="WFH">WFH</option>
        </select>

        <div style="margin-top:10px">
          <label>Camera</label>
          <video id="video" autoplay playsinline></video>
          <canvas id="canvas" style="display:none"></canvas>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button onclick="startCamera()">Buka Kamera</button>
            <button onclick="capture()">Ambil Selfie</button>
            <button onclick="stopCamera()" class="secondary">Tutup Kamera</button>
          </div>
          <div id="preview" class="preview"></div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button onclick="submitAttendance()">Kirim Absensi</button>
            <button onclick="clearPreview()" class="secondary">Reset</button>
          </div>
          <div id="attMsg" class="small" style="margin-top:8px"></div>
          <div class="hint">Catatan: Semua jenis absen wajib menyertakan selfie. Absen Masuk/Keluar memerlukan lokasi dalam radius kantor.</div>
        </div>
      </div>

      <!-- Full width: Reports -->
      <div class="card fullwidth">
        <h3>Laporan & Download</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="downloadReport('today')">Hari Ini</button>
          <button onclick="downloadReport('yesterday')">Kemarin</button>
          <button onclick="downloadReport('week')">Minggu Ini</button>
          <button onclick="downloadReport('month')">Bulan Ini</button>
          <button onclick="downloadReport('3months')">3 Bulan</button>
        </div>
        <div id="reportArea" style="margin-top:12px"></div>
      </div>
    </div>
  </div>

  <!-- QR Scanner modal -->
  <div id="scannerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center">
    <div style="background:#fff;padding:12px;border-radius:8px;max-width:420px;width:100%">
      <h4>Scan QR</h4>
      <div id="qrReader" style="width:100%;height:320px;background:#000"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="closeScanner()">Tutup</button>
      </div>
    </div>
  </div>

<script>
  // ====== SCRIPT_URL sudah diisi sesuai Web App URL Anda ======
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw1Vntxk8lF0AFi4KqDBEZVVmPZM7FYMcmGLv6yU3OiRCHPeDA87FXrmKkyZmFbIPCw/exec';

  // Helper fetch wrapper
  async function apiPost(payload) {
    if (!SCRIPT_URL || SCRIPT_URL.includes('PASTE_WEB_APP_URL')) {
      alert('SCRIPT_URL belum diatur. Ganti SCRIPT_URL di Index.html dengan URL Web App Anda.');
      throw new Error('SCRIPT_URL not set');
    }
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }

  // Admin login
  function adminLogin(){
    const user = document.getElementById('adminUser').value;
    const pass = document.getElementById('adminPass').value;
    document.getElementById('adminMsg').innerText = 'Memproses...';
    apiPost({ action: 'admin_login', username: user, password: pass })
      .then(j => {
        if (j.success) {
          document.getElementById('adminMsg').innerText = 'Login berhasil';
          document.getElementById('adminArea').style.display = 'block';
        } else {
          document.getElementById('adminMsg').innerText = j.error || 'Login gagal';
        }
      }).catch(err => document.getElementById('adminMsg').innerText = err.message);
  }
  function logoutAdmin(){
    document.getElementById('adminArea').style.display = 'none';
    document.getElementById('adminMsg').innerText = 'Logged out';
  }

  // Create employee
  function createEmployee(){
    const emp = {
      employeeId: document.getElementById('ce_id').value.trim(),
      name: document.getElementById('ce_name').value.trim(),
      department: document.getElementById('ce_dept').value.trim(),
      email: document.getElementById('ce_email').value.trim(),
      phone: document.getElementById('ce_phone').value.trim(),
      password: document.getElementById('ce_pass').value.trim()
    };
    if (!emp.employeeId || !emp.name) return document.getElementById('ce_msg').innerText = 'EmployeeID & Nama wajib';
    document.getElementById('ce_msg').innerText = 'Menyimpan...';
    apiPost({ action: 'admin_create_employee', employee: emp })
      .then(j => {
        if (j.success) {
          document.getElementById('ce_msg').innerText = 'Berhasil. Password: ' + j.password;
          loadEmployees();
        } else document.getElementById('ce_msg').innerText = j.error || 'Error';
      }).catch(err => document.getElementById('ce_msg').innerText = err.message);
  }

  // Load employees
  function loadEmployees(){
    apiPost({ action: 'get_employees' })
      .then(j => {
        if (!j.success) return alert('Gagal memuat karyawan');
        const list = j.employees;
        let html = '<table><tr><th>ID</th><th>Nama</th><th>Dept</th><th>Aksi</th></tr>';
        list.forEach(emp => {
          html += `<tr><td>${emp.employeeId}</td><td>${emp.name}</td><td>${emp.department}</td>
            <td class="actions">
              <button onclick="fillEmployee('${emp.employeeId}')">Pilih</button>
              <button onclick="resetPass('${emp.employeeId}')">Reset Password</button>
            </td></tr>`;
        });
        html += '</table>';
        document.getElementById('employeesList').innerHTML = html;
      }).catch(err => alert(err.message));
  }
  function fillEmployee(id){ document.getElementById('employeeIdInput').value = id; }
  function resetPass(empId){
    if (!confirm('Reset password untuk ' + empId + '?')) return;
    apiPost({ action: 'admin_reset_password', employeeId: empId })
      .then(j => {
        if (j.success) alert('Password baru: ' + j.password);
        else alert('Error: ' + (j.error||''));
      });
  }

  // Reports
  function downloadReport(range){
    document.getElementById('reportArea').innerText = 'Mengambil data...';
    apiPost({ action: 'get_attendance_report', range })
      .then(j => {
        if (!j.success) return alert('Gagal ambil laporan');
        const rows = j.data;
        let csv = 'Date,EmployeeID,Name,Department,Status,TimeIn,PhotoIn,TimeOut,PhotoOut,Note\n';
        rows.forEach(rw => {
          csv += `${rw.date},${rw.employeeId},${rw.name},${rw.department},${rw.status},${rw.timeIn||''},${rw.photoIn||''},${rw.timeOut||''},${rw.photoOut||''},${(rw.note||'').replace(/,/g,' ')}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'report_'+range+'.csv'; a.click();
        document.getElementById('reportArea').innerText = 'Selesai. File terdownload.';
      }).catch(err => document.getElementById('reportArea').innerText = err.message);
  }

  // Camera functions
  let stream;
  function startCamera(){
    const video = document.getElementById('video');
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(s => { stream = s; video.srcObject = s; video.play(); })
      .catch(err => alert('Tidak dapat mengakses kamera: ' + err.message));
  }
  function stopCamera(){
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; document.getElementById('video').srcObject = null; }
  }
  function capture(){
    const video = document.getElementById('video');
    if (!video || !video.videoWidth) return alert('Kamera belum aktif');
    const canvas = document.getElementById('canvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
    document.getElementById('preview').innerHTML = `<img src="${dataUrl}">`;
    document.getElementById('preview').dataset.photo = dataUrl;
  }
  function clearPreview(){ document.getElementById('preview').innerHTML = ''; delete document.getElementById('preview').dataset.photo; }

  // Submit attendance
  function submitAttendance(){
    const empId = document.getElementById('employeeIdInput').value.trim();
    const status = document.getElementById('statusSelect').value;
    const photo = document.getElementById('preview').dataset.photo;
    if (!empId) return alert('Masukkan EmployeeID atau scan QR');
    if (!photo) return alert('Ambil selfie terlebih dahulu');
    document.getElementById('attMsg').innerText = 'Mengirim...';
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude; const lng = pos.coords.longitude;
      const action = (status === 'Keluar') ? 'checkout' : 'checkin';
      apiPost({ action, employeeId: empId, status, lat, lng, photoBase64: photo })
        .then(j => {
          if (j.success) {
            document.getElementById('attMsg').innerText = 'Absensi berhasil';
            clearPreview();
          } else document.getElementById('attMsg').innerText = j.error || 'Gagal';
        }).catch(err => document.getElementById('attMsg').innerText = err.message);
    }, err => {
      alert('Gagal ambil lokasi: ' + err.message + '. Pastikan lokasi diaktifkan.');
      document.getElementById('attMsg').innerText = '';
    }, { enableHighAccuracy: true, timeout: 10000 });
  }

  // QR Scanner (html5-qrcode fallback to prompt)
  let html5QrcodeScanner;
  function openScanner(){
    if (typeof Html5Qrcode === 'undefined') {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js';
      s.onload = startScanner;
      s.onerror = () => { const id = prompt('Masukkan EmployeeID (atau paste hasil scan):'); if (id) document.getElementById('employeeIdInput').value = id; };
      document.head.appendChild(s);
    } else startScanner();
  }
  function startScanner(){
    document.getElementById('scannerModal').style.display = 'flex';
    const qrReader = document.getElementById('qrReader');
    qrReader.innerHTML = '';
    const config = { fps: 10, qrbox: 250 };
    html5QrcodeScanner = new Html5Qrcode("qrReader");
    Html5Qrcode.getCameras().then(cameras => {
      const cameraId = cameras && cameras.length ? cameras[0].id : null;
      html5QrcodeScanner.start(cameraId, config, decodedText => {
        document.getElementById('employeeIdInput').value = decodedText;
        closeScanner();
      }, errorMessage => {
        // ignore scan errors
      }).catch(err => {
        alert('Gagal memulai scanner: ' + err);
        closeScanner();
      });
    }).catch(err => {
      alert('Tidak ada kamera yang tersedia: ' + err);
      closeScanner();
    });
  }
  function closeScanner(){
    document.getElementById('scannerModal').style.display = 'none';
    if (html5QrcodeScanner) {
      html5QrcodeScanner.stop().then(() => html5QrcodeScanner.clear()).catch(()=>{});
      html5QrcodeScanner = null;
    }
  }

  window.addEventListener('beforeunload', () => { stopCamera(); if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(()=>{}); });
</script>
</body>
</html>
